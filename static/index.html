<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itinerary Bot - AI Travel Planner</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements"></div>
    
    <div class="container">
        <header>
            <h1>Itinerary Bot ✨</h1>
            <p>Smart Travel Planning within your Budget</p>
        </header>

        <section class="input-card glass">
            <h2>Where to?</h2>
            <form id="itinerary-form">
                <div class="input-group">
                    <label for="destination">Destination</label>
                    <input type="text" id="destination" placeholder="e.g., Tokyo, Paris, Bali" required>
                </div>
                <div class="row">
                    <div class="input-group">
                        <label for="budget">Budget ($)</label>
                        <input type="number" id="budget" placeholder="1000" min="10" required>
                    </div>
                    <div class="input-group">
                        <label for="days">Days</label>
                        <input type="number" id="days" placeholder="3" min="1" max="14" required>
                    </div>
                </div>
                <button type="submit" class="generate-btn" id="submit-btn">
                    <span>Generate Itinerary</span>
                    <div class="loader" id="btn-loader" style="display: none;"></div>
                </button>
            </form>
            <div id="error-message" class="error-msg" style="display: none;"></div>
        </section>

        <section id="results-section" class="results-section" style="display: none;">
            <div class="stats-cards">
                <div class="stat-card glass">
                    <h3>Places Visitable</h3>
                    <div class="stat-val" id="stat-places">--</div>
                </div>
                <div class="stat-card glass">
                    <h3>Estimated Cost</h3>
                    <div class="stat-val" id="stat-cost">$0</div>
                </div>
                <div class="stat-card glass">
                    <h3>Budget Surplus</h3>
                    <div class="stat-val" id="stat-surplus">$0</div>
                </div>
            </div>

            <div class="itinerary-board" id="itinerary-board">
                <!-- Days will be generated here -->
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
